name: CD Pipeline - Production

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Validación de seguridad
  security-validation:
    name: Security Validation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Fail on critical vulnerabilities
      run: |
        if grep -q "CRITICAL\|HIGH" trivy-results.sarif; then
          echo "Critical or High vulnerabilities found!"
          exit 1
        fi

  # Despliegue en staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: security-validation
    environment: staging
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure kubectl for staging
      run: |
        echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig

    - name: Deploy to staging
      run: |
        export KUBECONFIG=kubeconfig
        
        # Update images
        kubectl set image deployment/9001app-backend backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }} -n 9001app
        kubectl set image deployment/9001app-frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }} -n 9001app
        
        # Wait for rollout
        kubectl rollout status deployment/9001app-backend -n 9001app --timeout=300s
        kubectl rollout status deployment/9001app-frontend -n 9001app --timeout=300s

    - name: Run smoke tests
      run: |
        export KUBECONFIG=kubeconfig
        npm run test:smoke -- --base-url=${{ secrets.STAGING_URL }}

    - name: Run performance tests
      run: |
        export KUBECONFIG=kubeconfig
        npm run test:performance -- --base-url=${{ secrets.STAGING_URL }}

  # Aprobación manual para producción
  production-approval:
    name: Production Approval
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
    - name: Wait for approval
      run: echo "Waiting for manual approval to deploy to production"

  # Despliegue en producción
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: production-approval
    environment: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure kubectl for production
      run: |
        echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig

    - name: Create backup before deployment
      run: |
        export KUBECONFIG=kubeconfig
        kubectl exec deployment/9001app-backend -n 9001app -- mongodump --uri="${{ secrets.MONGODB_URI }}" --out=/tmp/backup-$(date +%Y%m%d-%H%M%S)

    - name: Deploy to production
      run: |
        export KUBECONFIG=kubeconfig
        
        # Update images
        kubectl set image deployment/9001app-backend backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }} -n 9001app
        kubectl set image deployment/9001app-frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }} -n 9001app
        
        # Wait for rollout
        kubectl rollout status deployment/9001app-backend -n 9001app --timeout=300s
        kubectl rollout status deployment/9001app-frontend -n 9001app --timeout=300s

    - name: Verify deployment
      run: |
        export KUBECONFIG=kubeconfig
        
        # Check pod status
        kubectl get pods -n 9001app
        
        # Check service endpoints
        kubectl get endpoints -n 9001app
        
        # Check ingress
        kubectl get ingress -n 9001app

    - name: Run health checks
      run: |
        export KUBECONFIG=kubeconfig
        
        # Wait for services to be ready
        sleep 30
        
        # Health check backend
        curl -f ${{ secrets.PRODUCTION_BACKEND_URL }}/health || exit 1
        
        # Health check frontend
        curl -f ${{ secrets.PRODUCTION_FRONTEND_URL }}/health || exit 1

    - name: Run smoke tests
      run: |
        npm run test:smoke -- --base-url=${{ secrets.PRODUCTION_URL }}

    - name: Run performance tests
      run: |
        npm run test:performance -- --base-url=${{ secrets.PRODUCTION_URL }}

  # Monitoreo post-despliegue
  post-deployment-monitoring:
    name: Post-Deployment Monitoring
    runs-on: ubuntu-latest
    needs: deploy-production
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure kubectl for production
      run: |
        echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig

    - name: Monitor application metrics
      run: |
        export KUBECONFIG=kubeconfig
        
        # Check CPU and memory usage
        kubectl top pods -n 9001app
        
        # Check logs for errors
        kubectl logs deployment/9001app-backend -n 9001app --tail=100 | grep -i error || echo "No errors found"
        kubectl logs deployment/9001app-frontend -n 9001app --tail=100 | grep -i error || echo "No errors found"

    - name: Check Prometheus metrics
      run: |
        # Check if metrics are being collected
        curl -s ${{ secrets.PROMETHEUS_URL }}/api/v1/query?query=up | jq '.data.result[] | select(.metric.job == "9001app-backend")'

  # Notificaciones
  notify-production:
    name: Notify Production Deployment
    runs-on: ubuntu-latest
    needs: [deploy-production, post-deployment-monitoring]
    if: always()
    steps:
    - name: Notify Slack - Success
      uses: 8398a7/action-slack@v3
      with:
        status: success
        channel: '#9001app-deployments'
        text: 'Production deployment completed successfully! 🚀'
        webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
      if: success()

    - name: Notify Slack - Failure
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#9001app-deployments'
        text: 'Production deployment failed! 🚨'
        webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
      if: failure()

    - name: Create GitHub release
      uses: actions/create-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          Production deployment completed successfully!
          
          Changes:
          - Backend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          - Frontend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
          
          Deployment time: ${{ github.event.head_commit.timestamp }}
        draft: false
        prerelease: false