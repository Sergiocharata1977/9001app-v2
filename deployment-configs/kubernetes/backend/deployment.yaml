apiVersion: apps/v1
kind: Deployment
metadata:
  name: 9001app-backend
  namespace: 9001app
  labels:
    app: 9001app-backend
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: 9001app-backend
  template:
    metadata:
      labels:
        app: 9001app-backend
        version: v1.0.0
    spec:
      containers:
      - name: backend
        image: 9001app/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: 9001app-secrets
              key: mongodb-uri
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: 9001app-secrets
              key: jwt-secret
        - name: AGENT_API_KEY
          valueFrom:
            secretKeyRef:
              name: 9001app-secrets
              key: agent-api-key
        - name: REDIS_URL
          value: "redis://9001app-redis:6379"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: backend-uploads-pvc
      - name: logs
        persistentVolumeClaim:
          claimName: backend-logs-pvc
      imagePullSecrets:
      - name: docker-registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: 9001app-backend-service
  namespace: 9001app
  labels:
    app: 9001app-backend
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: 9001app-backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: 9001app-backend-hpa
  namespace: 9001app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: 9001app-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60