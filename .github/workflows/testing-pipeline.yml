name: Testing Pipeline with DebugBot Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  MONGODB_URI: 'mongodb://localhost:27017/test'
  JWT_SECRET: 'test-secret-key'

jobs:
  # Frontend Testing
  frontend-tests:
    runs-on: ubuntu-latest
    name: Frontend Tests & Analysis
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
        
    - name: TypeScript type checking
      run: |
        cd frontend
        npm run type-check
        
    - name: ESLint code analysis
      run: |
        cd frontend
        npm run lint
        
    - name: Prettier code formatting check
      run: |
        cd frontend
        npm run format -- --check
        
    - name: Run unit tests
      run: |
        cd frontend
        npm run test -- --coverage --reporter=verbose
        
    - name: Run integration tests
      run: |
        cd frontend
        npm run test:integration
        
    - name: Upload frontend coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage
        
    - name: Generate test report
      if: always()
      run: |
        cd frontend
        echo "## Frontend Test Results" >> $GITHUB_STEP_SUMMARY
        echo "### Coverage Summary" >> $GITHUB_STEP_SUMMARY
        if [ -f coverage/coverage-summary.json ]; then
          cat coverage/coverage-summary.json >> $GITHUB_STEP_SUMMARY
        fi

  # Backend Testing
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests & Analysis
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
        
    - name: Install backend dependencies
      run: |
        cd backend
        npm ci
        
    - name: TypeScript compilation
      run: |
        cd backend
        npm run build
        
    - name: ESLint code analysis
      run: |
        cd backend
        npm run lint
        
    - name: Run unit tests
      run: |
        cd backend
        npm test -- --coverage
      env:
        MONGODB_URI: ${{ env.MONGODB_URI }}
        JWT_SECRET: ${{ env.JWT_SECRET }}
        NODE_ENV: test
        
    - name: Upload backend coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage/lcov.info
        flags: backend
        name: backend-coverage

  # Security Analysis
  security-analysis:
    runs-on: ubuntu-latest
    name: Security Analysis
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Install dependencies
      run: |
        cd frontend && npm ci
        cd ../backend && npm ci
        
    - name: Frontend security audit
      run: |
        cd frontend
        npm audit --audit-level high
        
    - name: Backend security audit
      run: |
        cd backend
        npm audit --audit-level high
        
    - name: Run security linting
      run: |
        cd frontend
        npm run lint:security || true
        
    - name: CodeQL Analysis
      uses: github/codeql-action/init@v2
      with:
        languages: javascript, typescript
        
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

  # E2E Testing
  e2e-tests:
    runs-on: ubuntu-latest
    name: End-to-End Tests
    needs: [frontend-tests, backend-tests]
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Install dependencies
      run: |
        cd frontend && npm ci
        cd ../backend && npm ci
        
    - name: Build applications
      run: |
        cd backend && npm run build
        cd ../frontend && npm run build
        
    - name: Start backend server
      run: |
        cd backend
        npm start &
        sleep 10
      env:
        MONGODB_URI: ${{ env.MONGODB_URI }}
        JWT_SECRET: ${{ env.JWT_SECRET }}
        NODE_ENV: test
        
    - name: Start frontend server
      run: |
        cd frontend
        npm run preview &
        sleep 10
        
    - name: Run Cypress E2E tests
      run: |
        cd frontend
        npm run cypress:run
        
    - name: Upload E2E artifacts
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: cypress-screenshots
        path: frontend/cypress/screenshots
        retention-days: 30

  # Performance Testing
  performance-tests:
    runs-on: ubuntu-latest
    name: Performance Analysis
    needs: [frontend-tests, backend-tests]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Install dependencies
      run: |
        cd frontend && npm ci
        
    - name: Build frontend
      run: |
        cd frontend
        npm run build
        
    - name: Analyze bundle size
      run: |
        cd frontend
        npx vite-bundle-analyzer dist
        
    - name: Lighthouse CI
      run: |
        npm install -g @lhci/cli@0.12.x
        cd frontend
        lhci autorun || echo "Lighthouse CI completed with warnings"

  # Code Quality Report
  quality-report:
    runs-on: ubuntu-latest
    name: Code Quality Report
    needs: [frontend-tests, backend-tests, security-analysis]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Generate Quality Report
      run: |
        echo "# 🧪 Testing Pipeline Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## ✅ Completed Jobs" >> $GITHUB_STEP_SUMMARY
        echo "- Frontend Tests: ${{ needs.frontend-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Backend Tests: ${{ needs.backend-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Security Analysis: ${{ needs.security-analysis.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📊 Quality Metrics" >> $GITHUB_STEP_SUMMARY
        echo "- TypeScript: ✅ Strict mode enabled" >> $GITHUB_STEP_SUMMARY
        echo "- ESLint: ✅ No errors allowed" >> $GITHUB_STEP_SUMMARY
        echo "- Test Coverage: 🎯 70% minimum threshold" >> $GITHUB_STEP_SUMMARY
        echo "- Security: 🔒 Vulnerability scanning enabled" >> $GITHUB_STEP_SUMMARY
        
    - name: Comment PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '🤖 **DebugBot Testing Report**\n\n✅ All automated tests have been executed. Check the Actions tab for detailed results and coverage reports.'
          })

  # Deployment Preview (if tests pass)
  deployment-preview:
    runs-on: ubuntu-latest
    name: Deployment Preview
    needs: [frontend-tests, backend-tests, security-analysis]
    if: github.event_name == 'pull_request' && needs.frontend-tests.result == 'success' && needs.backend-tests.result == 'success'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Build applications
      run: |
        cd frontend && npm ci && npm run build
        cd ../backend && npm ci && npm run build
        
    - name: Deploy to staging
      run: |
        echo "🚀 Deploying to staging environment..."
        echo "Frontend build size: $(du -sh frontend/dist | cut -f1)"
        echo "Backend build size: $(du -sh backend/dist | cut -f1)"